<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="420" height="100">
  <defs>
    <!-- Silver metallic gradient for the icon background -->
    <linearGradient id="silverBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e8ecf0"/>
      <stop offset="35%"  stop-color="#c8d0d8"/>
      <stop offset="60%"  stop-color="#f0f3f5"/>
      <stop offset="100%" stop-color="#a8b4c0"/>
    </linearGradient>

    <!-- Silver metallic gradient for the Ag text -->
    <linearGradient id="silverText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="30%"  stop-color="#d0d8e0"/>
      <stop offset="65%"  stop-color="#8899aa"/>
      <stop offset="100%" stop-color="#b0bcc8"/>
    </linearGradient>

    <!-- Subtle inner glow -->
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Node gradient for causal graph dots -->
    <radialGradient id="nodeFill" cx="40%" cy="35%">
      <stop offset="0%"   stop-color="#e0e8f0"/>
      <stop offset="100%" stop-color="#8899aa"/>
    </radialGradient>
  </defs>

  <!-- Icon: rounded square background -->
  <rect x="4" y="8" width="84" height="84" rx="16" ry="16"
        fill="url(#silverBg)" stroke="#98a8b8" stroke-width="1.2"/>

  <!-- Subtle inner highlight (top edge) -->
  <rect x="5" y="9" width="82" height="30" rx="14" ry="14"
        fill="white" fill-opacity="0.25"/>

  <!-- Causal graph: three nodes connected by arrows -->
  <!-- Node A (top-left) -->
  <circle cx="30" cy="34" r="7" fill="url(#nodeFill)" stroke="#7a8a99" stroke-width="1"/>
  <!-- Node B (top-right) -->
  <circle cx="62" cy="34" r="7" fill="url(#nodeFill)" stroke="#7a8a99" stroke-width="1"/>
  <!-- Node C (bottom-center) -->
  <circle cx="46" cy="64" r="7" fill="url(#nodeFill)" stroke="#7a8a99" stroke-width="1"/>

  <!-- Arrow A → B -->
  <line x1="37.5" y1="34" x2="54.5" y2="34" stroke="#607080" stroke-width="1.8" stroke-linecap="round"/>
  <polygon points="54.5,30.5 62,34 54.5,37.5" fill="#607080"/>

  <!-- Arrow A → C -->
  <line x1="33.5" y1="40.5" x2="42.5" y2="57.5" stroke="#607080" stroke-width="1.8" stroke-linecap="round"/>
  <polygon points="38.5,56 46,64 43,55" fill="#607080"/>

  <!-- Arrow B → C -->
  <line x1="58.5" y1="40.5" x2="49.5" y2="57.5" stroke="#607080" stroke-width="1.8" stroke-linecap="round"/>
  <polygon points="53.5,56 46,64 49,55" fill="#607080"/>

  <!-- "Ag" superscript inside node A (silver chemical symbol reference) -->
  <text x="30" y="37.5" text-anchor="middle" font-family="Georgia, serif"
        font-size="9" font-weight="bold" fill="url(#silverText)" filter="url(#glow)">Ag</text>

  <!-- Wordmark: "argenta" -->
  <text x="106" y="64" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="42" font-weight="700" letter-spacing="-1"
        fill="#2c3a48">argenta</text>

  <!-- Tagline -->
  <text x="108" y="82" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="12.5" font-weight="400" letter-spacing="0.5"
        fill="#7a8a99">warehouse-native causal ML</text>
</svg>
